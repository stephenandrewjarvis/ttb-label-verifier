<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="900" fill="#f0ece4" rx="20"/>
  <rect x="15" y="15" width="570" height="870" fill="none" stroke="#2c2c2c" stroke-width="3" rx="15"/>
  <rect x="25" y="25" width="550" height="850" fill="none" stroke="#2c2c2c" stroke-width="1" rx="12"/>

  <!-- Top band -->
  <rect x="15" y="15" width="570" height="70" fill="#2c2c2c" rx="15"/>
  <rect x="15" y="70" width="570" height="15" fill="#2c2c2c"/>
  <text x="300" y="57" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold" letter-spacing="5">GLEN CAIRN DISTILLERY</text>

  <!-- Emblem -->
  <circle cx="300" cy="175" r="80" fill="#2c2c2c" opacity="0.06"/>
  <text x="300" y="200" text-anchor="middle" font-size="90" fill="#2c2c2c" opacity="0.35">🏴󠁧󠁢󠁳󠁣󠁴󠁿</text>
  <text x="300" y="195" text-anchor="middle" font-size="70" fill="#2c2c2c" opacity="0.3">⚜</text>

  <!-- Est. -->
  <text x="300" y="275" text-anchor="middle" fill="#3a3020" font-size="12" letter-spacing="3">SPEYSIDE, SCOTLAND · EST. 1848</text>

  <!-- Brand name -->
  <text x="300" y="325" text-anchor="middle" fill="#1a1a1a" font-size="44" font-weight="bold" letter-spacing="1">GLEN CAIRN</text>
  <text x="300" y="362" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="bold" letter-spacing="3">12 YEAR OLD</text>

  <!-- Divider -->
  <line x1="80" y1="380" x2="520" y2="380" stroke="#c9a84c" stroke-width="2"/>
  <circle cx="300" cy="380" r="4" fill="#c9a84c"/>

  <!-- Class/Type -->
  <text x="300" y="415" text-anchor="middle" fill="#3a3020" font-size="19" letter-spacing="2" font-style="italic">Single Malt Scotch Whisky</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="520" y2="432" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- ABV -->
  <text x="170" y="482" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">43%</text>
  <text x="170" y="502" text-anchor="middle" fill="#3a3020" font-size="11" letter-spacing="2">ALC./VOL.</text>
  <line x1="300" y1="462" x2="300" y2="515" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="430" y="482" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">86</text>
  <text x="430" y="502" text-anchor="middle" fill="#3a3020" font-size="11" letter-spacing="2">PROOF</text>

  <!-- Net contents -->
  <text x="300" y="548" text-anchor="middle" fill="#1a1a1a" font-size="18" letter-spacing="2">700 mL</text>

  <!-- Divider -->
  <line x1="80" y1="565" x2="520" y2="565" stroke="#c9a84c" stroke-width="1"/>

  <!-- Tasting notes -->
  <text x="300" y="593" text-anchor="middle" fill="#3a3020" font-size="12" font-style="italic">Honey · Dried Fruit · Gentle Smoke</text>

  <!-- Producer info -->
  <text x="300" y="632" text-anchor="middle" fill="#3a3020" font-size="11" letter-spacing="1">GLEN CAIRN DISTILLERY LTD., DUFFTOWN, BANFFSHIRE AB55 4DH, SCOTLAND</text>
  <text x="300" y="649" text-anchor="middle" fill="#3a3020" font-size="11" letter-spacing="1">IMPORTED BY HIGHLAND IMPORTS LLC, NEW YORK, NY 10001</text>
  <text x="300" y="666" text-anchor="middle" fill="#3a3020" font-size="11" letter-spacing="1">COUNTRY OF ORIGIN: SCOTLAND</text>

  <!-- Government Warning box -->
  <rect x="40" y="692" width="520" height="100" fill="#fff" opacity="0.6" rx="4"/>
  <rect x="40" y="692" width="520" height="100" fill="none" stroke="#2c2c2c" stroke-width="1" rx="4"/>
  <text x="300" y="712" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold" letter-spacing="1">GOVERNMENT WARNING:</text>
  <text x="55" y="729" fill="#1a1a1a" font-size="9">(1) According to the Surgeon General, women should not drink alcoholic</text>
  <text x="55" y="744" fill="#1a1a1a" font-size="9">beverages during pregnancy because of the risk of birth defects.</text>
  <text x="55" y="759" fill="#1a1a1a" font-size="9">(2) Consumption of alcoholic beverages impairs your ability to drive a car</text>
  <text x="55" y="774" fill="#1a1a1a" font-size="9">or operate machinery, and may cause health problems.</text>

  <!-- Bottom band -->
  <rect x="15" y="808" width="570" height="77" fill="#2c2c2c" rx="0"/>
  <rect x="15" y="860" width="570" height="25" fill="#2c2c2c" rx="15"/>
  <text x="300" y="840" text-anchor="middle" fill="#c9a84c" font-size="12" letter-spacing="2">AGED IN AMERICAN OAK EX-BOURBON CASKS</text>
  <text x="300" y="860" text-anchor="middle" fill="#c9a84c" font-size="11" letter-spacing="2">NON CHILL-FILTERED · NATURAL COLOUR</text>
</svg>
