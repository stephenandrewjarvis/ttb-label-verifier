<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="900" fill="#eef3f7" rx="20"/>
  <rect x="15" y="15" width="570" height="870" fill="none" stroke="#2f5d7c" stroke-width="4" rx="15"/>
  <rect x="25" y="25" width="550" height="850" fill="none" stroke="#2f5d7c" stroke-width="1.5" rx="12"/>

  <!-- Top band -->
  <rect x="15" y="15" width="570" height="80" fill="#16384f" rx="15"/>
  <rect x="15" y="75" width="570" height="20" fill="#16384f"/>
  <text x="300" y="65" text-anchor="middle" fill="#bcd3e6" font-size="22" font-weight="bold" letter-spacing="6">SILVERPEAK</text>

  <!-- Emblem -->
  <circle cx="300" cy="180" r="80" fill="#16384f" opacity="0.08"/>
  <circle cx="300" cy="180" r="75" fill="none" stroke="#2f5d7c" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" font-size="80" fill="#2f5d7c" opacity="0.6">❄</text>

  <!-- Est. year -->
  <text x="300" y="275" text-anchor="middle" fill="#2f5d7c" font-size="13" letter-spacing="3">ESTABLISHED 2009</text>

  <!-- Main brand name -->
  <text x="300" y="335" text-anchor="middle" fill="#16384f" font-size="52" font-weight="bold" letter-spacing="2">SILVERPEAK</text>
  <text x="300" y="382" text-anchor="middle" fill="#16384f" font-size="34" font-weight="bold" letter-spacing="6">VODKA</text>

  <!-- Divider -->
  <line x1="80" y1="400" x2="520" y2="400" stroke="#2f5d7c" stroke-width="2"/>
  <circle cx="300" cy="400" r="5" fill="#2f5d7c"/>

  <!-- Class/Type -->
  <text x="300" y="440" text-anchor="middle" fill="#2f5d7c" font-size="20" letter-spacing="3" font-style="italic">Premium Craft Vodka</text>

  <line x1="80" y1="455" x2="520" y2="455" stroke="#2f5d7c" stroke-width="2"/>

  <!-- ABV and Proof -->
  <text x="170" y="510" text-anchor="middle" fill="#16384f" font-size="26" font-weight="bold">40%</text>
  <text x="170" y="530" text-anchor="middle" fill="#2f5d7c" font-size="11" letter-spacing="2">ALC./VOL.</text>
  <line x1="300" y1="485" x2="300" y2="545" stroke="#2f5d7c" stroke-width="1.5"/>
  <text x="430" y="510" text-anchor="middle" fill="#16384f" font-size="26" font-weight="bold">80</text>
  <text x="430" y="530" text-anchor="middle" fill="#2f5d7c" font-size="11" letter-spacing="2">PROOF</text>

  <!-- Net contents -->
  <text x="300" y="575" text-anchor="middle" fill="#16384f" font-size="18" letter-spacing="2">750 mL</text>

  <rect x="60" y="595" width="480" height="2" fill="#2f5d7c"/>

  <!-- Producer info -->
  <text x="300" y="625" text-anchor="middle" fill="#2f5d7c" font-size="11" letter-spacing="1">DISTILLED BY SILVERPEAK DISTILLERY CO.</text>
  <text x="300" y="643" text-anchor="middle" fill="#2f5d7c" font-size="11" letter-spacing="1">88 ALPINE WAY, DENVER, COLORADO 80202</text>

  <!-- Government Warning box — INTENTIONAL VIOLATION: title case, not all caps -->
  <rect x="40" y="665" width="520" height="110" fill="#fff" opacity="0.7" rx="4"/>
  <rect x="40" y="665" width="520" height="110" fill="none" stroke="#2f5d7c" stroke-width="1" rx="4"/>

  <text x="300" y="685" text-anchor="middle" fill="#16384f" font-size="10" font-weight="normal" letter-spacing="1">Government Warning:</text>
  <text x="55" y="703" fill="#16384f" font-size="9">(1) According to the Surgeon General, women should not drink alcoholic</text>
  <text x="55" y="718" fill="#16384f" font-size="9">beverages during pregnancy because of the risk of birth defects.</text>
  <text x="55" y="733" fill="#16384f" font-size="9">(2) Consumption of alcoholic beverages impairs your ability to drive a car</text>
  <text x="55" y="748" fill="#16384f" font-size="9">or operate machinery, and may cause health problems.</text>

  <!-- Bottom band -->
  <rect x="15" y="790" width="570" height="95" fill="#16384f" rx="0"/>
  <rect x="15" y="865" width="570" height="20" fill="#16384f" rx="15"/>
  <text x="300" y="820" text-anchor="middle" fill="#bcd3e6" font-size="11" letter-spacing="3">DISTILLED FIVE TIMES · CHARCOAL FILTERED</text>
  <text x="300" y="845" text-anchor="middle" fill="#bcd3e6" font-size="10" letter-spacing="2">PRODUCT OF USA</text>
</svg>
