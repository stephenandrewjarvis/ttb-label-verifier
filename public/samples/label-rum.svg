<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="900" fill="#fdf3e3" rx="20"/>
  <rect x="15" y="15" width="570" height="870" fill="none" stroke="#8B2500" stroke-width="4" rx="15"/>
  <rect x="25" y="25" width="550" height="850" fill="none" stroke="#8B2500" stroke-width="1.5" rx="12"/>

  <!-- Top band -->
  <rect x="15" y="15" width="570" height="80" fill="#4a1200" rx="15"/>
  <rect x="15" y="75" width="570" height="20" fill="#4a1200"/>
  <text x="300" y="65" text-anchor="middle" fill="#f5c842" font-size="22" font-weight="bold" letter-spacing="6">CARIBBEAN GOLD SPIRITS</text>

  <!-- Sun emblem -->
  <circle cx="300" cy="180" r="80" fill="#e8a020" opacity="0.12"/>
  <circle cx="300" cy="180" r="75" fill="none" stroke="#8B2500" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" font-size="80" fill="#8B2500" opacity="0.55">&#9728;</text>

  <!-- Est. -->
  <text x="300" y="275" text-anchor="middle" fill="#5a2000" font-size="13" letter-spacing="3">SAN JUAN, PUERTO RICO · EST. 1934</text>

  <!-- Main brand name -->
  <text x="300" y="330" text-anchor="middle" fill="#4a1200" font-size="44" font-weight="bold" letter-spacing="2">CARIBBEAN</text>
  <text x="300" y="375" text-anchor="middle" fill="#4a1200" font-size="40" font-weight="bold" letter-spacing="2">GOLD</text>

  <!-- Divider -->
  <line x1="80" y1="395" x2="520" y2="395" stroke="#8B2500" stroke-width="2"/>
  <circle cx="300" cy="395" r="5" fill="#8B2500"/>
  <line x1="80" y1="400" x2="520" y2="400" stroke="#8B2500" stroke-width="0.5"/>

  <!-- Class/Type -->
  <text x="300" y="435" text-anchor="middle" fill="#5a2000" font-size="20" letter-spacing="3" font-style="italic">Premium Dark Rum</text>

  <!-- Divider -->
  <line x1="80" y1="450" x2="520" y2="450" stroke="#8B2500" stroke-width="0.5"/>
  <line x1="80" y1="455" x2="520" y2="455" stroke="#8B2500" stroke-width="2"/>

  <!-- ABV and Proof -->
  <text x="170" y="510" text-anchor="middle" fill="#4a1200" font-size="26" font-weight="bold">40%</text>
  <text x="170" y="530" text-anchor="middle" fill="#5a2000" font-size="11" letter-spacing="2">ALC./VOL.</text>
  <line x1="300" y1="485" x2="300" y2="545" stroke="#8B2500" stroke-width="1.5"/>
  <text x="430" y="510" text-anchor="middle" fill="#4a1200" font-size="26" font-weight="bold">80</text>
  <text x="430" y="530" text-anchor="middle" fill="#5a2000" font-size="11" letter-spacing="2">PROOF</text>

  <!-- Net contents -->
  <text x="300" y="575" text-anchor="middle" fill="#4a1200" font-size="18" letter-spacing="2">750 mL</text>

  <!-- Decorative band -->
  <rect x="60" y="595" width="480" height="2" fill="#8B2500"/>

  <!-- Producer info — label uses "CARIBBEAN GOLD SPIRITS" without "CO." (intentional fuzzy match) -->
  <text x="300" y="625" text-anchor="middle" fill="#5a2000" font-size="11" letter-spacing="1">BOTTLED BY CARIBBEAN GOLD SPIRITS</text>
  <text x="300" y="643" text-anchor="middle" fill="#5a2000" font-size="11" letter-spacing="1">456 PALM AVE, MIAMI, FLORIDA 33101</text>

  <!-- Government Warning box -->
  <rect x="40" y="665" width="520" height="110" fill="#fff" opacity="0.7" rx="4"/>
  <rect x="40" y="665" width="520" height="110" fill="none" stroke="#5a2000" stroke-width="1" rx="4"/>
  <text x="300" y="685" text-anchor="middle" fill="#4a1200" font-size="10" font-weight="bold" letter-spacing="1">GOVERNMENT WARNING:</text>
  <text x="55" y="703" fill="#4a1200" font-size="9">(1) According to the Surgeon General, women should not drink alcoholic</text>
  <text x="55" y="718" fill="#4a1200" font-size="9">beverages during pregnancy because of the risk of birth defects.</text>
  <text x="55" y="733" fill="#4a1200" font-size="9">(2) Consumption of alcoholic beverages impairs your ability to drive a car</text>
  <text x="55" y="748" fill="#4a1200" font-size="9">or operate machinery, and may cause health problems.</text>

  <!-- Bottom decorative -->
  <rect x="15" y="790" width="570" height="95" fill="#4a1200" rx="0"/>
  <rect x="15" y="865" width="570" height="20" fill="#4a1200" rx="15"/>
  <text x="300" y="820" text-anchor="middle" fill="#f5c842" font-size="11" letter-spacing="3">AGED 5 YEARS IN CHARRED OAK BARRELS</text>
  <text x="300" y="845" text-anchor="middle" fill="#f5c842" font-size="10" letter-spacing="2">PRODUCT OF USA</text>
</svg>
