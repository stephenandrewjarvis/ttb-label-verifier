<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="600" height="900" fill="#fdf6e3" rx="20"/>
  <rect x="15" y="15" width="570" height="870" fill="none" stroke="#c17f24" stroke-width="3" rx="15"/>
  <rect x="25" y="25" width="550" height="850" fill="none" stroke="#c17f24" stroke-width="1" rx="12"/>

  <!-- Top band -->
  <rect x="15" y="15" width="570" height="70" fill="#1a3a1a" rx="15"/>
  <rect x="15" y="70" width="570" height="15" fill="#1a3a1a"/>
  <text x="300" y="57" text-anchor="middle" fill="#f5c842" font-size="18" font-weight="bold" letter-spacing="5">IRON ANVIL BREWING CO.</text>

  <!-- Emblem -->
  <circle cx="300" cy="175" r="80" fill="#1a3a1a" opacity="0.07"/>
  <text x="300" y="200" text-anchor="middle" font-size="90" fill="#c17f24" opacity="0.5">⚒</text>

  <!-- Est. -->
  <text x="300" y="275" text-anchor="middle" fill="#5a3e00" font-size="12" letter-spacing="3">PORTLAND, OREGON · EST. 2008</text>

  <!-- Brand name -->
  <text x="300" y="325" text-anchor="middle" fill="#1a1a1a" font-size="44" font-weight="bold" letter-spacing="1">IRON ANVIL</text>
  <text x="300" y="368" text-anchor="middle" fill="#1a1a1a" font-size="36" font-weight="bold" letter-spacing="1">BREWING CO.</text>

  <!-- Divider -->
  <line x1="80" y1="385" x2="520" y2="385" stroke="#c17f24" stroke-width="2"/>
  <circle cx="300" cy="385" r="4" fill="#c17f24"/>

  <!-- Class/Type -->
  <text x="300" y="420" text-anchor="middle" fill="#5a3e00" font-size="20" letter-spacing="2" font-style="italic">India Pale Ale</text>

  <!-- Divider -->
  <line x1="80" y1="438" x2="520" y2="438" stroke="#c17f24" stroke-width="1.5"/>

  <!-- ABV and IBU row -->
  <text x="170" y="488" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">6.8%</text>
  <text x="170" y="508" text-anchor="middle" fill="#5a3e00" font-size="11" letter-spacing="2">ALC./VOL.</text>
  <line x1="300" y1="468" x2="300" y2="520" stroke="#c17f24" stroke-width="1.5"/>
  <text x="430" y="488" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">65</text>
  <text x="430" y="508" text-anchor="middle" fill="#5a3e00" font-size="11" letter-spacing="2">IBU</text>

  <!-- Net contents -->
  <text x="300" y="555" text-anchor="middle" fill="#1a1a1a" font-size="18" letter-spacing="2">12 fl oz · 355 mL</text>

  <!-- Divider -->
  <line x1="80" y1="572" x2="520" y2="572" stroke="#c17f24" stroke-width="1"/>

  <!-- Flavor notes -->
  <text x="300" y="600" text-anchor="middle" fill="#5a3e00" font-size="12" font-style="italic">Citrus · Pine · Tropical Fruit</text>

  <!-- Producer info -->
  <text x="300" y="638" text-anchor="middle" fill="#5a3e00" font-size="11" letter-spacing="1">IRON ANVIL BREWING CO., 1842 NW INDUSTRIAL ST, PORTLAND, OR 97209</text>

  <!-- Government Warning box -->
  <rect x="40" y="665" width="520" height="105" fill="#fff" opacity="0.6" rx="4"/>
  <rect x="40" y="665" width="520" height="105" fill="none" stroke="#c17f24" stroke-width="1" rx="4"/>
  <text x="300" y="685" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold" letter-spacing="1">GOVERNMENT WARNING:</text>
  <text x="55" y="702" fill="#1a1a1a" font-size="9">(1) According to the Surgeon General, women should not drink alcoholic</text>
  <text x="55" y="717" fill="#1a1a1a" font-size="9">beverages during pregnancy because of the risk of birth defects.</text>
  <text x="55" y="732" fill="#1a1a1a" font-size="9">(2) Consumption of alcoholic beverages impairs your ability to drive a car</text>
  <text x="55" y="747" fill="#1a1a1a" font-size="9">or operate machinery, and may cause health problems.</text>

  <!-- Bottom band -->
  <rect x="15" y="785" width="570" height="100" fill="#1a3a1a" rx="0"/>
  <rect x="15" y="860" width="570" height="25" fill="#1a3a1a" rx="15"/>
  <text x="300" y="825" text-anchor="middle" fill="#f5c842" font-size="12" letter-spacing="2">CRAFT BREWED WITH PACIFIC NORTHWEST HOPS</text>
  <text x="300" y="848" text-anchor="middle" fill="#f5c842" font-size="11" letter-spacing="2">PRODUCT OF USA</text>
</svg>
