<svg width="600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="600" height="900" fill="#f9f4ee" rx="20"/>
  <rect x="15" y="15" width="570" height="870" fill="none" stroke="#6b3a2a" stroke-width="3" rx="15"/>
  <rect x="25" y="25" width="550" height="850" fill="none" stroke="#6b3a2a" stroke-width="1" rx="12"/>

  <!-- Top band -->
  <rect x="15" y="15" width="570" height="70" fill="#6b3a2a" rx="15"/>
  <rect x="15" y="70" width="570" height="15" fill="#6b3a2a"/>
  <text x="300" y="57" text-anchor="middle" fill="#f0d9b5" font-size="18" font-weight="bold" letter-spacing="5">SILVER RIDGE CELLARS</text>

  <!-- Vineyard illustration (simple) -->
  <ellipse cx="300" cy="175" rx="90" ry="90" fill="#6b3a2a" opacity="0.07"/>
  <text x="300" y="200" text-anchor="middle" font-size="100" fill="#6b3a2a" opacity="0.4">🍇</text>

  <!-- Est. -->
  <text x="300" y="275" text-anchor="middle" fill="#6b3a2a" font-size="12" letter-spacing="3">NAPA VALLEY · EST. 1962</text>

  <!-- Brand name -->
  <text x="300" y="325" text-anchor="middle" fill="#1a0a00" font-size="44" font-weight="bold" letter-spacing="1">SILVER RIDGE</text>
  <text x="300" y="368" text-anchor="middle" fill="#1a0a00" font-size="36" font-weight="bold" letter-spacing="1">CELLARS</text>

  <!-- Divider -->
  <line x1="80" y1="385" x2="520" y2="385" stroke="#6b3a2a" stroke-width="1.5"/>
  <circle cx="300" cy="385" r="4" fill="#6b3a2a"/>

  <!-- Class/Type -->
  <text x="300" y="418" text-anchor="middle" fill="#6b3a2a" font-size="19" letter-spacing="2" font-style="italic">Cabernet Sauvignon</text>
  <text x="300" y="440" text-anchor="middle" fill="#6b3a2a" font-size="13" letter-spacing="2">2019 · NAPA VALLEY</text>

  <!-- Divider -->
  <line x1="80" y1="455" x2="520" y2="455" stroke="#6b3a2a" stroke-width="1.5"/>

  <!-- ABV -->
  <text x="300" y="500" text-anchor="middle" fill="#1a0a00" font-size="22" font-weight="bold">14.5% Alc./Vol.</text>

  <!-- Net contents -->
  <text x="300" y="535" text-anchor="middle" fill="#1a0a00" font-size="16" letter-spacing="2">750 mL</text>

  <!-- Divider -->
  <line x1="80" y1="555" x2="520" y2="555" stroke="#6b3a2a" stroke-width="1"/>

  <!-- Producer info -->
  <text x="300" y="585" text-anchor="middle" fill="#6b3a2a" font-size="11" letter-spacing="1">SILVER RIDGE CELLARS, 4500 SILVERADO TRAIL, NAPA, CA 94558</text>
  <text x="300" y="619" text-anchor="middle" fill="#6b3a2a" font-size="11" letter-spacing="1">PRODUCT OF USA · CONTAINS SULFITES</text>

  <!-- Government Warning box -->
  <rect x="40" y="640" width="520" height="105" fill="#fff" opacity="0.6" rx="4"/>
  <rect x="40" y="640" width="520" height="105" fill="none" stroke="#6b3a2a" stroke-width="1" rx="4"/>
  <text x="300" y="660" text-anchor="middle" fill="#1a0a00" font-size="10" font-weight="bold" letter-spacing="1">GOVERNMENT WARNING:</text>
  <text x="55" y="677" fill="#1a0a00" font-size="9">(1) According to the Surgeon General, women should not drink alcoholic</text>
  <text x="55" y="692" fill="#1a0a00" font-size="9">beverages during pregnancy because of the risk of birth defects.</text>
  <text x="55" y="707" fill="#1a0a00" font-size="9">(2) Consumption of alcoholic beverages impairs your ability to drive a car</text>
  <text x="55" y="722" fill="#1a0a00" font-size="9">or operate machinery, and may cause health problems.</text>

  <!-- Bottom band -->
  <rect x="15" y="760" width="570" height="125" fill="#6b3a2a" rx="0"/>
  <rect x="15" y="860" width="570" height="25" fill="#6b3a2a" rx="15"/>
  <text x="300" y="808" text-anchor="middle" fill="#f0d9b5" font-size="12" letter-spacing="2">HAND-HARVESTED · SMALL BATCH</text>
  <text x="300" y="832" text-anchor="middle" fill="#f0d9b5" font-size="11" letter-spacing="2">UNFILTERED · UNFINED</text>
</svg>
